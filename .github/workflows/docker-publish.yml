name: Publish Docker image to GHCR

# Build and push the multi-arch image to ghcr.io/qelos/better-mcp.
# Triggers:
#   - Push to main         -> :main, :sha-<short>
#   - Tag v*               -> :latest, :vX.Y.Z, :X.Y, :X
#   - Manual dispatch      -> :main
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # qelos/better-mcp -> ghcr.io/qelos/better-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to GHCR
      id-token: write   # for provenance/attestations (optional but recommended)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public (idempotent)
        # The first push of a new package is private by default. This step
        # promotes it to public so others can `docker pull` without auth.
        # Safe to run on every push (no-op once already public).
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          PKG="$(basename "${{ github.repository }}")"
          # `gh api` requires the org/user packages endpoint; try org first then user.
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/orgs/$OWNER/packages/container/$PKG" \
            -f visibility=public 2>/dev/null \
            || gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/users/$OWNER/packages/container/$PKG" \
            -f visibility=public 2>/dev/null \
            || echo "Could not auto-promote visibility — set it manually in repo settings → Packages."
